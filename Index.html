<style>

:root{
--black-main:#0A0A0A;
--black-card:#121212;
--gold-main:#C6A75E;
--gold-light:#E5D3A1;
--text-muted:#9b9b9b;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--black-main);
color:white;
}

/* HEADER */

header{
background:rgba(0,0,0,0.9);
backdrop-filter:blur(10px);
padding:25px;
text-align:center;
border-bottom:1px solid rgba(198,167,94,0.3);
}

header h1{
font-family:'Playfair Display',serif;
font-size:34px;
background:linear-gradient(90deg,var(--gold-light),var(--gold-main));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:4px;
}

/* NAV */

nav{
display:flex;
justify-content:center;
gap:50px;
padding:20px;
background:#0f0f0f;
}

nav a{
color:var(--gold-main);
text-decoration:none;
font-weight:400;
position:relative;
}

nav a::after{
content:"";
position:absolute;
width:0%;
height:1px;
bottom:-5px;
left:0;
background:var(--gold-main);
transition:0.3s;
}

nav a:hover::after{
width:100%;
}

/* SECTIONS */

section{
padding:80px 20px;
text-align:center;
}

.section-title{
font-size:30px;
margin-bottom:50px;
color:var(--gold-light);
}

/* CARDS */

.card{
background:var(--black-card);
border-radius:16px;
padding:40px;
margin:20px auto;
max-width:500px;
border:1px solid rgba(198,167,94,0.2);
box-shadow:0 10px 40px rgba(0,0,0,0.6);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
border:1px solid rgba(198,167,94,0.5);
}

input{
padding:12px;
border-radius:30px;
border:1px solid rgba(198,167,94,0.3);
background:#1b1b1b;
color:white;
width:220px;
outline:none;
}

button{
padding:12px 30px;
border-radius:30px;
border:none;
background:linear-gradient(90deg,var(--gold-light),var(--gold-main));
color:black;
font-weight:600;
cursor:pointer;
margin-top:15px;
transition:0.3s;
}

button:hover{
opacity:0.85;
}

/* TABLE */

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:var(--black-card);
border-radius:12px;
overflow:hidden;
}

th{
background:#111;
color:var(--gold-main);
padding:15px;
font-weight:500;
}

td{
padding:15px;
border-top:1px solid rgba(198,167,94,0.15);
}

tr:hover{
background:rgba(198,167,94,0.05);
}

/* FOOTER */

footer{
background:#0f0f0f;
padding:30px;
border-top:1px solid rgba(198,167,94,0.2);
color:var(--text-muted);
}

</style>
